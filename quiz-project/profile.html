<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - QuizX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { fontFamily: { poppins: ['Poppins', 'sans-serif'] } }
            }
        }
    </script>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        
        .gradient-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .avatar-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        }
        
        .card-shadow {
            box-shadow: 0 10px 40px -15px rgba(0, 0, 0, 0.1);
        }
        
        .profile-photo-container {
            position: relative;
            display: inline-block;
        }
        
        .profile-photo-container:hover .photo-overlay {
            opacity: 1;
        }
        
        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        
        .nav-blur {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <nav class="nav-blur shadow-sm fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-14 sm:h-16">
                <div class="flex items-center gap-2">
                    <a href="dashboard.html" class="p-2 rounded-lg hover:bg-slate-100 transition-colors">
                        <i class="fas fa-arrow-left text-slate-600"></i>
                    </a>
                    <a href="index.html" class="flex items-center gap-2">
                        <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl gradient-primary flex items-center justify-center shadow-lg">
                            <span class="text-white text-lg sm:text-xl font-bold">Q</span>
                        </div>
                        <span class="text-xl sm:text-2xl font-bold gradient-text hidden sm:block">QuizX</span>
                    </a>
                </div>
                
                <div class="flex items-center gap-2">
                    <a href="dashboard.html" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-lg text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 transition-all">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="leaderboard.html" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-lg text-slate-600 hover:bg-amber-50 hover:text-amber-600 transition-all">
                        <i class="fas fa-trophy"></i>
                        <span>Leaderboard</span>
                    </a>
                    <button onclick="logout()" class="p-2 rounded-lg hover:bg-red-50 text-red-500 transition-all" title="Logout">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-20 pb-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto">
        <div class="bg-white rounded-2xl lg:rounded-3xl card-shadow overflow-hidden mb-6">
            <div class="gradient-primary p-6 sm:p-8 text-center">
                <div class="profile-photo-container mb-4">
                    <div id="profilePhoto" class="w-28 h-28 sm:w-32 sm:h-32 rounded-full bg-white/20 flex items-center justify-center text-white text-5xl sm:text-6xl font-bold mx-auto shadow-xl border-4 border-white/30 overflow-hidden">
                        U
                    </div>
                    <div class="photo-overlay" onclick="document.getElementById('photoInput').click()">
                        <i class="fas fa-camera text-white text-2xl"></i>
                    </div>
                    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="updatePhoto(event)">
                </div>
                <h2 id="profileNameDisplay" class="text-2xl sm:text-3xl font-bold text-white mb-1">User Name</h2>
                <p id="profileEmail" class="text-white/80 text-sm sm:text-base">user@email.com</p>
                <span id="profileRole" class="inline-block mt-3 px-4 py-1.5 bg-white/20 backdrop-blur-sm text-white rounded-full text-xs sm:text-sm font-semibold">
                    User
                </span>
            </div>
            
            <div class="p-6 sm:p-8">
                <div class="grid sm:grid-cols-2 gap-4 sm:gap-6 mb-8">
                    <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
                        <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center">
                            <i class="fas fa-calendar-alt text-blue-600 text-lg"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-wide">Member Since</p>
                            <p id="memberSince" class="font-semibold text-slate-800">Jan 2024</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-xl">
                        <div class="w-12 h-12 rounded-xl bg-emerald-100 flex items-center justify-center">
                            <i class="fas fa-check-circle text-emerald-600 text-lg"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-wide">Account Status</p>
                            <p class="font-semibold text-emerald-600 flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                Active
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="text-center">
                    <button onclick="document.getElementById('photoInput').click()" class="gradient-primary text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg transition-all text-sm sm:text-base inline-flex items-center gap-2">
                        <i class="fas fa-camera"></i>
                        Change Profile Photo
                    </button>
                    <p class="text-xs text-slate-400 mt-2">JPG, PNG or GIF. Max 2MB.</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl lg:rounded-3xl card-shadow overflow-hidden">
            <div class="p-6 sm:p-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-user-edit text-indigo-600"></i>
                    Edit Profile
                </h3>
                
                <form id="profileForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Full Name</label>
                        <input type="text" id="editName" required minlength="2"
                            class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                            placeholder="Enter your full name">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                        <input type="email" id="editEmail" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-100 cursor-not-allowed"
                            placeholder="Enter your email" readonly>
                        <p class="text-xs text-slate-500 mt-1">Email cannot be changed</p>
                    </div>
                    
                    <button type="submit" id="saveProfileBtn" class="w-full gradient-primary text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i>
                        Save Changes
                    </button>
                </form>
            </div>
        </div>

        <div class="bg-white rounded-2xl lg:rounded-3xl card-shadow overflow-hidden mt-6">
            <div class="p-6 sm:p-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-lock text-indigo-600"></i>
                    Account Settings
                </h3>
                
                <form id="passwordForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Current Password</label>
                        <div class="relative">
                            <input type="password" id="currentPassword" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all pr-12"
                                placeholder="Enter current password">
                            <button type="button" onclick="togglePasswordVisibility('currentPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i class="fas fa-eye" id="currentPasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">New Password</label>
                        <div class="relative">
                            <input type="password" id="newPassword" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all pr-12"
                                placeholder="Enter new password" minlength="6">
                            <button type="button" onclick="togglePasswordVisibility('newPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i class="fas fa-eye" id="newPasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Confirm New Password</label>
                        <div class="relative">
                            <input type="password" id="confirmNewPassword" 
                                class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all pr-12"
                                placeholder="Confirm new password" minlength="6">
                            <button type="button" onclick="togglePasswordVisibility('confirmNewPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                                <i class="fas fa-eye" id="confirmNewPasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div id="passwordError" class="hidden text-red-500 text-sm text-center py-2 bg-red-50 rounded-lg"></div>
                    <div id="passwordSuccess" class="hidden text-emerald-500 text-sm text-center py-2 bg-emerald-50 rounded-lg"></div>
                    
                    <button type="submit" id="changePasswordBtn" class="w-full bg-slate-800 text-white py-3 rounded-xl font-semibold hover:bg-slate-900 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-key"></i>
                        Change Password
                    </button>
                </form>
            </div>
        </div>
        
        <div id="successToast" class="fixed bottom-4 right-4 bg-emerald-500 text-white px-6 py-3 rounded-xl shadow-lg hidden items-center gap-2">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Success!</span>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        if (!requireAuth()) { throw new Error('Auth required'); }

        let currentUser = getCurrentUser();
        
        async function initProfile() {
            await initializeDatabase();
            loadProfile();
        }
        
        initProfile();
        
        function loadProfile() {
            document.getElementById('profileNameDisplay').textContent = currentUser.name;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('profileRole').textContent = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editEmail').value = currentUser.email;
            
            document.getElementById('memberSince').textContent = new Date(currentUser.createdAt).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            
            updateProfilePhoto();
        }
        
        function updateProfilePhoto() {
            const photoDiv = document.getElementById('profilePhoto');
            if (currentUser.photo) {
                photoDiv.innerHTML = `<img src="${currentUser.photo}" alt="Profile" class="w-full h-full rounded-full object-cover">`;
            } else {
                const initial = currentUser.name.charAt(0).toUpperCase();
                photoDiv.textContent = initial;
            }
        }
        
        function updatePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024) {
                showToast('File size must be less than 2MB', 'error');
                return;
            }
            
            if (!file.type.startsWith('image/')) {
                showToast('Please select an image file', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                const photoData = e.target.result;
                
                await updateUserData(currentUser.id, { photo: photoData });
                
                currentUser.photo = photoData;
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({
                    ...JSON.parse(localStorage.getItem(STORAGE_KEYS.CURRENT_USER)),
                    user: { ...currentUser, photo: photoData }
                }));
                
                updateProfilePhoto();
                showToast('Profile photo updated!');
            };
            reader.readAsDataURL(file);
        }
        
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newName = document.getElementById('editName').value.trim();
            const saveBtn = document.getElementById('saveProfileBtn');
            
            if (newName.length < 2) {
                showToast('Name must be at least 2 characters', 'error');
                return;
            }
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                await updateUserData(currentUser.id, { name: newName });
                
                currentUser.name = newName;
                localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({
                    ...JSON.parse(localStorage.getItem(STORAGE_KEYS.CURRENT_USER)),
                    user: { ...currentUser }
                }));
                
                document.getElementById('profileNameDisplay').textContent = newName;
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Saved!';
                
                showToast('Profile updated successfully!');
                
                setTimeout(() => {
                    saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
                    saveBtn.disabled = false;
                }, 2000);
            } catch (error) {
                showToast('Failed to update profile', 'error');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
                saveBtn.disabled = false;
            }
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;
            const errorDiv = document.getElementById('passwordError');
            const successDiv = document.getElementById('passwordSuccess');
            const saveBtn = document.getElementById('changePasswordBtn');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            if (newPass.length < 6) {
                errorDiv.textContent = 'New password must be at least 6 characters';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (newPass !== confirmPass) {
                errorDiv.textContent = 'New passwords do not match';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Changing...';
            
            try {
                const dbUser = await getUserById(currentUser.id);
                const hashedCurrent = hashPassword(currentPass);
                
                if (!dbUser || dbUser.password !== hashedCurrent) {
                    errorDiv.textContent = 'Current password is incorrect';
                    errorDiv.classList.remove('hidden');
                    saveBtn.innerHTML = '<i class="fas fa-key"></i> Change Password';
                    saveBtn.disabled = false;
                    return;
                }
                
                const hashedNew = hashPassword(newPass);
                await updateUserData(currentUser.id, { password: hashedNew });
                
                successDiv.textContent = 'Password changed successfully!';
                successDiv.classList.remove('hidden');
                
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
                
                saveBtn.innerHTML = '<i class="fas fa-check"></i> Changed!';
                
                setTimeout(() => {
                    saveBtn.innerHTML = '<i class="fas fa-key"></i> Change Password';
                    saveBtn.disabled = false;
                }, 2000);
            } catch (error) {
                errorDiv.textContent = 'Failed to change password';
                errorDiv.classList.remove('hidden');
                saveBtn.innerHTML = '<i class="fas fa-key"></i> Change Password';
                saveBtn.disabled = false;
            }
        });
        
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + 'Icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('successToast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.className = `fixed bottom-4 right-4 ${type === 'error' ? 'bg-red-500' : 'bg-emerald-500'} text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-2`;
            
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            
            window.dispatchEvent(new Event('userProfileUpdated'));
            
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 3000);
        }
        
        loadProfile();
    </script>
</body>
</html>
